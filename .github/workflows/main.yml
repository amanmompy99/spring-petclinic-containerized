name: Spring Petclinic CI/CD Workflow

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  ECR_REPOSITORY: spring-petclinic

permissions:
  id-token: write        # required for OIDC → AWS
  contents: read

jobs:
  security_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (source)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          vuln-type: os,library
          exit-code: 0
          output: trivy-fs-results.json

      - name: Upload filesystem scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.json

  build_scan_push:
    runs-on: ubuntu-latest
    needs: security_scan
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------
      # SONAR + UNIT TESTS
      # -------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Unit Tests
        run: ./mvnw test

      - name: SonarCloud Scan
        if: github.ref == 'refs/heads/main'
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}


      # -------------------------------
      # AWS AUTH (MAIN BRANCH ONLY)
      # -------------------------------
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------------
      # DOCKER BUILD
      # -------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (multi-stage)
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ] && [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            # main branch → use ECR registry
            docker build \
              -f Dockerfile \
              -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG .
          else
            # PRs and feature branches → local tag only
            docker build \
              -f Dockerfile \
              -t local/$ECR_REPOSITORY:$IMAGE_TAG .
          fi

      # -------------------------------
      # TRIVY IMAGE SCAN
      # -------------------------------
      - name: Trivy image scan (final container)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: |
            ${{ github.ref == 'refs/heads/main' && github.event_name == 'push'
                && format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.ECR_REPOSITORY, github.sha)
                || format('docker.io/local/{0}:{1}', env.ECR_REPOSITORY, github.sha) }}
          format: json
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: 1
          output: trivy-image-results.json

      - name: Upload image scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-results
          path: trivy-image-results.json

      # -------------------------------
      # PUSH TO ECR (MAIN ONLY)
      # -------------------------------
      - name: Push image to ECR (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          BRANCH_NAME=${GITHUB_REF_NAME//\//-}

          # Tag with branch+sha
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPOSITORY:$BRANCH_NAME-$IMAGE_TAG

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$BRANCH_NAME-$IMAGE_TAG

          # Also tag latest for main
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$BRANCH_NAME-$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
